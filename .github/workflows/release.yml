name: Release

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags like v1.0.0, v0.1.0-rc1, etc.

permissions:
  contents: write  # Required for creating releases

jobs:
  validate-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}
      is-prerelease: ${{ steps.check-prerelease.outputs.is-prerelease }}

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install tomli

    - name: Get version from pyproject.toml
      id: get-version
      run: |
        python -c "import tomli; f = open('pyproject.toml', 'rb'); data = tomli.load(f); print(f\"version={data['project']['version']}\")" >> $GITHUB_OUTPUT

    - name: Validate tag matches version
      run: |
        TAG_VERSION=${GITHUB_REF#refs/tags/v}
        PACKAGE_VERSION=${{ steps.get-version.outputs.version }}

        if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
          echo "Error: Tag version ($TAG_VERSION) does not match package version ($PACKAGE_VERSION)"
          exit 1
        fi

        echo "✅ Version validation passed: $PACKAGE_VERSION"

    - name: Check if pre-release
      id: check-prerelease
      run: |
        TAG_VERSION=${GITHUB_REF#refs/tags/v}
        if [[ "$TAG_VERSION" =~ -(rc|alpha|beta) ]]; then
          echo "is-prerelease=true" >> $GITHUB_OUTPUT
          echo "This is a pre-release version"
        else
          echo "is-prerelease=false" >> $GITHUB_OUTPUT
          echo "This is a stable release"
        fi

  build:
    needs: validate-version
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install build twine

    - name: Build package
      run: |
        python -m build

    - name: Check distribution
      run: |
        python -m twine check dist/*

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: python-package-distributions
        path: dist/
        retention-days: 5

  create-release:
    needs: [validate-version, build]
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: python-package-distributions
        path: dist/

    - name: Extract changelog for this version
      id: changelog
      run: |
        VERSION=${{ needs.validate-version.outputs.version }}

        # Create a simple release notes template
        cat > release_notes.md << EOF
        ## MCP Filesystem Server v${VERSION}

        This release includes the built distribution packages for mcp-server-filesystem.

        ### Installation

        \`\`\`bash
        pip install mcp-server-filesystem==${VERSION}
        \`\`\`

        ### Files

        - Source distribution (.tar.gz)
        - Wheel distribution (.whl)

        See the [README](https://github.com/MarcusJellinghaus/mcp_server_filesystem#readme) for usage instructions.
        EOF

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: dist/*
        body_path: release_notes.md
        draft: false
        prerelease: ${{ needs.validate-version.outputs.is-prerelease == 'true' }}
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

