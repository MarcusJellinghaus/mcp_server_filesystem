name: CI

on:
  push:
    branches: ["*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  check-forbidden-folders:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
    - uses: actions/checkout@v6

    - name: Check for forbidden folders in PR
      run: |
        echo "Checking for forbidden folders in pull request..."

        # Function to check for folder existence case-insensitively
        check_forbidden_folder() {
          local pattern="$1"
          local description="$2"

          # Use find with case-insensitive matching
          if find . -type d -ipath "*${pattern}*" -print -quit | grep -q .; then
            echo "❌ ERROR: Found forbidden folder matching '${pattern}'"
            echo "Description: ${description}"
            find . -type d -ipath "*${pattern}*" | sed 's/^/ Found: /'
            return 1
          else
            echo "✅ No forbidden folder found for pattern: ${pattern}"
            return 0
          fi
        }

        # Function to check if folder is empty (or doesn't exist)
        check_empty_folder() {
          local pattern="$1"
          local description="$2"

          # Find matching folders
          local folders=$(find . -type d -path "*${pattern}*" 2>/dev/null)

          if [ -z "$folders" ]; then
            echo "✅ Folder not found (acceptable): ${pattern}"
            return 0
          fi

          # Check if any found folder is not empty
          local has_content=0
          while IFS= read -r folder; do
            if [ -n "$(find "$folder" -mindepth 1 -print -quit)" ]; then
              echo "❌ ERROR: Folder should be empty: ${folder}"
              echo "Description: ${description}"
              find "$folder" -mindepth 1 -maxdepth 1 | sed 's/^/ Contains: /'
              has_content=1
            fi
          done <<< "$folders"

          if [ $has_content -eq 1 ]; then
            return 1
          else
            echo "✅ Folder exists and is empty: ${pattern}"
            return 0
          fi
        }

        # Check for forbidden folders
        ERROR=0

        check_forbidden_folder "pr_info/steps" "Temporary development steps folder" || ERROR=1
        check_forbidden_folder "pr_info/.conversations" "Temporary conversation history folder" || ERROR=1
        check_empty_folder "docs/tests/performance_data/prof" "Profiler output folder should be empty in PRs" || ERROR=1

        # Check for forbidden commit message file
        if [ -f "pr_info/.commit_message.txt" ]; then
            echo "❌ ERROR: Found forbidden file pr_info/.commit_message.txt"
            echo "Description: Transient commit message file should not be committed"
            ERROR=1
        else
            echo "✅ No forbidden commit message file found"
        fi

        if [ $ERROR -eq 1 ]; then
          echo ""
          echo "❌ PULL REQUEST BLOCKED: Forbidden folders detected!"
          echo "These folders should not be included in pull requests."
          echo "Please remove them and update your .gitignore if necessary."
          echo "Note: These folders are allowed in regular commits, just not in PRs."
          exit 1
        else
          echo ""
          echo "✅ All checks passed! No forbidden folders found."
        fi

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        check:
          - {name: "black", cmd: "black --version && black --check src tests"}
          - {name: "isort", cmd: "isort --version && isort --check --profile=black --float-to-top src tests"}
          - {name: "pylint", cmd: "pylint --version && pylint ./src ./tests"}
          - {name: "unit-tests", cmd: "pytest --version && pytest -n auto -m 'not git_integration and not github_integration'"}
          - {name: "git-integration-tests", cmd: "pytest --version && pytest -n auto -m 'git_integration'"}
          - {name: "mypy", cmd: "mypy --version && mypy --strict src tests"}

    name: ${{ matrix.check.name }}
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Environment info
        run: |
          uname -a
          python --version
          uv --version
          git --version

      - name: Run ${{ matrix.check.name }}
        run: ${{ matrix.check.cmd }}

  check-github-secrets:
    runs-on: ubuntu-latest
    outputs:
      has-secrets: ${{ steps.check.outputs.has-secrets }}
    steps:
      - id: check
        env:
          TOKEN: ${{ secrets.GH_INTEGRATION_TOKEN }}
          REPO_URL: ${{ vars.GH_TEST_REPO_URL }}
        run: |
          echo "=== GitHub Integration Test Configuration ==="
          echo ""
          echo "Checking required credentials:"
          if [[ -n "$TOKEN" ]]; then
            echo "  ✅ GH_INTEGRATION_TOKEN: configured (secret)"
          else
            echo "  ❌ GH_INTEGRATION_TOKEN: NOT configured"
            echo "     → Create a repo secret with a PAT that has 'repo' scope"
          fi
          if [[ -n "$REPO_URL" ]]; then
            echo "  ✅ GH_TEST_REPO_URL: $REPO_URL (variable)"
          else
            echo "  ❌ GH_TEST_REPO_URL: NOT configured"
            echo "     → Create a repo variable with the test repository URL"
          fi
          echo ""
          if [[ -n "$TOKEN" && -n "$REPO_URL" ]]; then
            echo "✅ All credentials present — github-integration-tests will run"
            echo "has-secrets=true" >> $GITHUB_OUTPUT
          else
            echo "⏭️ Missing credentials — github-integration-tests will be skipped"
            echo "   Configure at: Settings → Secrets and variables → Actions"
          fi

  github-integration-tests:
    runs-on: ubuntu-latest
    needs: check-github-secrets
    if: needs.check-github-secrets.outputs.has-secrets == 'true'
    name: github-integration-tests
    env:
      GITHUB_TOKEN: ${{ secrets.GH_INTEGRATION_TOKEN }}
      GITHUB_TEST_REPO_URL: ${{ vars.GH_TEST_REPO_URL }}
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Environment info
        run: |
          uname -a
          python --version
          uv --version
          git --version

      - name: Integration test configuration
        run: |
          echo "✅ GitHub integration tests enabled"
          echo "  Token: configured (GH_INTEGRATION_TOKEN)"
          echo "  Test repo: $GITHUB_TEST_REPO_URL"

      - name: Run github-integration-tests
        run: pytest --version && pytest -n auto -m 'github_integration'

  file-size:
    runs-on: ubuntu-latest
    name: file-size
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8

      - name: Check file sizes
        # mcp-coder is run via uvx in an isolated environment.
        # --with . ensures uvx uses THIS branch's mcp_workspace instead of
        # whatever version mcp_coder would resolve as a transitive dependency.
        run: uvx --from "git+https://github.com/MarcusJellinghaus/mcp_coder.git" --with . mcp-coder check file-size --max-lines 750 --allowlist-file .large-files-allowlist

  architecture:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        check:
          - {name: "import-linter", cmd: "uv pip show import-linter | grep Version && ./tools/lint_imports.sh"}
          - {name: "tach", cmd: "tach --version && tach check"}
          - {name: "pycycle", cmd: "pycycle --version && pycycle --here"}
          - {name: "vulture", cmd: "vulture --version && vulture src tests vulture_whitelist.py --min-confidence 60"}
    name: ${{ matrix.check.name }}
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv pip install --system -e ".[dev,architecture]"

      - name: Environment info
        run: |
          uname -a
          python --version
          uv --version
          git --version

      - name: Run ${{ matrix.check.name }}
        run: ${{ matrix.check.cmd }}
